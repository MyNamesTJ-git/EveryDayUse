# MangoWM Config — meloworld (Catppuccin Mocha)
# More options: [https://github.com/DreamMaoMao/mango/wiki/](https://github.com/DreamMaoMao/mango/wiki/)

# ─── Autostart ────────────────────────────────────────────────────────────────
exec-once = qs -c noctalia-shell
# exec-once = noctalia
exec-once = xdg-desktop-portal
exec-once = xdg-desktop-portal-wlr
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec-once = sleep 1 && steam -nochatui -nofriendui -silent
exec-once = sleep 1 && flatpak run --command=opendeck me.amankhanna.opendeck --hide

# ─── Environment Variables ────────────────────────────────────────────────────
env = XDG_CURRENT_DESKTOP,mango
env = XDG_DESKTOP_PORTAL_DIR,/usr/share/xdg/desktop-portal

# ─── Window Effects ───────────────────────────────────────────────────────────
blur=1
blur_layer=0
blur_optimized=0
blur_params_num_passes=2
blur_params_radius=3
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2
shadows=0
layer_shadows=0
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x181825FF
# border_radius=4
border_radius=0
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.85
allow_tearing=0

# ─── Animations ───────────────────────────────────────────────────────────────
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# ─── Scroller Layout ──────────────────────────────────────────────────────────
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# ─── Master-Stack Layout ──────────────────────────────────────────────────────
new_is_master=1
default_mfact=0.5
default_nmaster=1
smartgaps=0

# ─── Overview ─────────────────────────────────────────────────────────────────
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# ─── Misc ─────────────────────────────────────────────────────────────────────
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
drag_tile_to_tile=1

# ─── Keyboard ─────────────────────────────────────────────────────────────────
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us

# ─── Trackpad ─────────────────────────────────────────────────────────────────
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# ─── Mouse ────────────────────────────────────────────────────────────────────
mouse_natural_scrolling=0
mouse_accel_profile=1
mouse_accel_speed=-0.1
trackpad_accel_profile=1
trackpad_accel_speed=-0.6

# ─── Cursor ───────────────────────────────────────────────────────────────────
cursor_size=24
cursor_theme=Bibata-Modern-Ice

# ─── Appearance ───────────────────────────────────────────────────────────────
gappih=3
gappiv=3
gappoh=5
gappov=5
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=3
rootcolor=0x1E1E2EFF
bordercolor=0x585B70FF
focuscolor=0xCBA6F7FF
maximizescreencolor=0x74C7ECFF
urgentcolor=0xF38BA8FF
scratchpadcolor=0x94E2D5FF
globalcolor=0xB4BEFEFF
overlaycolor=0xF5C2E7FF

# ─── Tag Layout Rules ─────────────────────────────────────────────────────────
tagrule=id:1,layout_name:dwindle
tagrule=id:2,layout_name:dwindle
tagrule=id:3,layout_name:dwindle
tagrule=id:4,layout_name:dwindle
tagrule=id:5,layout_name:dwindle
tagrule=id:6,layout_name:dwindle
tagrule=id:7,layout_name:dwindle
tagrule=id:8,layout_name:dwindle
tagrule=id:9,layout_name:dwindle

# ═══════════════════════════════════════════════════════════════════════════════
# KEY BINDINGS
#
# Modifier logic (matches Hyprland habits):
#   SUPER           = window focus / navigation
#   SUPER+SHIFT     = window manipulation (resize, state change, move to tag)
#   SUPER+ALT       = window swap / monitor send / layout controls
#   SUPER+CTRL      = config reload / tag navigation
#   CTRL+SHIFT      = floating window move
#   ALT+SHIFT       = monitor focus
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Session ──────────────────────────────────────────────────────────────────
bind=SUPER+CTRL,r,reload_config
bind=SUPER+SHIFT,l,spawn,hyprlock
bind=SUPER,escape,spawn,qs -c noctalia-shell ipc call sessionMenu toggle
# bind=SUPER,escape,spawn,noctalia msg panel-toggle sessionMenu

# ─── Launch ───────────────────────────────────────────────────────────────────
bind=SUPER,Return,spawn,kitty
bind=SUPER,b,spawn,helium
bind=Super,d,spawn,rofi -show drun

# ─── Window: Lifecycle ────────────────────────────────────────────────────────
bind=SUPER,q,killclient

# ─── Window: Focus ────────────────────────────────────────────────────────────
bind=SUPER,left,focusdir,left
bind=SUPER,right,focusdir,right
bind=SUPER,up,focusdir,up
bind=SUPER,down,focusdir,down

# ─── Window: Overview & Stack Cycle ──────────────────────────────────────────
bind=SUPER,Tab,toggleoverview
bind=SUPER+SHIFT,Tab,focusstack,next

# ─── Window: Swap (matches SUPER+ALT+arrow from Hyprland) ────────────────────
bind=SUPER+ALT,left,exchange_client,left
bind=SUPER+ALT,right,exchange_client,right
bind=SUPER+ALT,up,exchange_client,up
bind=SUPER+ALT,down,exchange_client,down

# ─── Window: State ────────────────────────────────────────────────────────────
bind=SUPER,space,togglefloating
bind=SUPER,f,togglefullscreen
bind=SUPER+SHIFT,f,togglefakefullscreen
bind=SUPER,m,togglemaximizescreen
bind=SUPER,g,toggleglobal
bind=SUPER,o,toggleoverlay
bind=SUPER,grave,minimized

# ─── Window: Resize (matches SUPER+SHIFT+arrow from Hyprland) ────────────────
bind=SUPER+SHIFT,up,resizewin,+0,-20
bind=SUPER+SHIFT,down,resizewin,+0,+20
bind=SUPER+SHIFT,left,resizewin,-20,+0
bind=SUPER+SHIFT,right,resizewin,+20,+0

# ─── Layout ───────────────────────────────────────────────────────────────────
bind=SUPER+ALT,space,switch_layout
bind=SUPER+ALT,f,set_proportion,1.0
bind=SUPER+ALT,p,switch_proportion_preset
bind=SUPER,z,setlayout,tile
bind=SUPER,x,setlayout,scroller
bind=SUPER,c,setlayout,dwindle

# ─── Gaps ─────────────────────────────────────────────────────────────────────
bind=SUPER+ALT,equal,incgaps,1
bind=SUPER+ALT,minus,incgaps,-1
bind=SUPER+ALT,g,togglegaps

# ─── Tags: Switch ─────────────────────────────────────────────────────────────
bind=SUPER+CTRL,left,viewtoleft,0
bind=SUPER+CTRL,right,viewtoright,0
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# ─── Tags: Move Client ────────────────────────────────────────────────────────
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# ─── Monitor ──────────────────────────────────────────────────────────────────
monitorrule=name:DP-1,width:1920,height:1080,refresh:240.30,x:0,y:0
monitorrule=name:HDMI-A-1,width:1920,height:1080,refresh:240.30,x:1920,y:850
bind=ALT+SHIFT,left,focusmon,left
bind=ALT+SHIFT,right,focusmon,right
bind=SUPER+ALT+SHIFT,left,tagmon,left
bind=SUPER+ALT+SHIFT,right,tagmon,right

# ─── Window: Move (Floating) ──────────────────────────────────────────────────
bind=CTRL+SHIFT,up,movewin,+0,-20
bind=CTRL+SHIFT,down,movewin,+0,+20
bind=CTRL+SHIFT,left,movewin,-20,+0
bind=CTRL+SHIFT,right,movewin,+20,+0

# ─── Mouse ────────────────────────────────────────────────────────────────────
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# ─── Scroll: Tag Navigation ───────────────────────────────────────────────────
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# ─── Media & Hardware Keys ────────────────────────────────────────────────────
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit 1.0
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set 5%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-

# ─── Media Controls ───────────────────────────────────────────────────────────
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=SUPER,slash,spawn,playerctl play-pause
bind=SUPER,period,spawn,playerctl next

# ─── Screenshots ──────────────────────────────────────────────────────────────
bind=SUPER+SHIFT,s,spawn,~/.config/mango/scripts/screenshot.sh

# ─── Noctalia ─────────────────────────────────────────────────────────────────
# bind=SUPER,d,spawn,qs -c noctalia-shell ipc call launcher toggle
# bind=SUPER,d,spawn,noctalia msg panel-toggle launcher
bind=SUPER+SHIFT,m,spawn,qs -c noctalia-shell ipc call controlCenter toggle
# bind=SUPER+SHIFT,m,spawn,noctalia msg panel-toggle control-center

# ─── Vim Arrows (hjkl) ────────────────────────────────────────────────────────
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

bind=SUPER+ALT,h,exchange_client,left
bind=SUPER+ALT,l,exchange_client,right
bind=SUPER+ALT,k,exchange_client,up
bind=SUPER+ALT,j,exchange_client,down

bind=SUPER+SHIFT,h,resizewin,-20,+0
bind=SUPER+SHIFT,l,resizewin,+20,+0
bind=SUPER+SHIFT,k,resizewin,+0,-20
bind=SUPER+SHIFT,j,resizewin,+0,+20

bind=SUPER+CTRL,h,viewtoleft,0
bind=SUPER+CTRL,l,viewtoright,0

bind=ALT+SHIFT,h,focusmon,left
bind=ALT+SHIFT,l,focusmon,right
bind=ALT+SHIFT,k,focusmon,up
bind=ALT+SHIFT,j,focusmon,down

bind=SUPER+ALT+SHIFT,h,tagmon,left
bind=SUPER+ALT+SHIFT,l,tagmon,right
bind=SUPER+ALT+SHIFT,k,tagmon,up
bind=SUPER+ALT+SHIFT,j,tagmon,down

# ─── Screenshots ──────────────────────────────────────────────────────────────
bind=SUPER,s,spawn,grim - | wl-copy
bind=SUPER+SHIFT,s,spawn,grim -g "$(slurp)" - | wl-copy
bind=SUPER+CTRL,s,spawn,grim ~/Screenshots/$(date +%Y-%m-%d_%H-%M-%S.png)
bind=SUPER+CTRL+SHIFT,s,spawn,grim -g "$(slurp)" ~/Screenshots/$(date +%Y-%m-%d_%H-%M-%S.png)

# ─── Window Rules ─────────────────────────────────────────────────────────────

# Just a heads up, some of this was done with the help of LLMs. I used it to make quick porting from my hyprland configuration to mangowm. I will be editing it over time to make sure everything works.
